name: anidaku
description: "A modern Android app to stream and download anime!"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Network, parsing, cryptographic deps
  http: ^1.2.0
  graphql: ^5.1.3
  html: ^0.15.6
  encrypt: ^5.0.3
  js_unpack: ^1.0.4
  url_launcher: ^6.3.1
  flutter_web_auth_2: ^4.0.1
  crypto: ^3.0.6

  # Core utils
  path_provider: ^2.0.11
  awesome_notifications: ^0.10.1
  package_info_plus: ^9.0.0
  permission_handler: ^12.0.1
  device_info_plus: ^12.3.0
  provider: ^6.1.2
  file_picker: ^10.2.0
  dynamic_color: ^1.7.0
  app_links: ^7.0.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.1.0

  # Media and player related
  open_file: ^3.5.10
  wakelock_plus: ^1.2.10

  better_player:
    git:
      url: https://github.com/frostnova721/betterplayer.git
  
  fvp: 
    git:
      url: "https://github.com/frostnova721/fvp.git"

  # UI
  pull_to_refresh: ^2.0.0
  flutter_markdown_plus: ^1.0.7
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^2.7.0
  google_fonts: ^6.1.0

  # Misc
  flutter_native_splash: ^2.4.7
  screen_brightness: ^2.1.8
  commentum_client:
    git:
      url: https://github.com/frostnova721/commentum_client

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter_native_splash:
  android: true
  color: "#0a0e27"
  color_dark: "#0a0e27"
  image: "lib/assets/icons/logo_foreground_splash.png"
  image_dark: "lib/assets/icons/logo_foreground_splash.png"

  android_12:
    image: "lib/assets/icons/logo_foreground_splash.png"

flutter_launcher_icons:
  android: true
  image_path: "./lib/assets/icons/logo.png"
  adaptive_icon_background: "./lib/assets/icons/logo_background.png"
  adaptive_icon_foreground: "./lib/assets/icons/logo_foreground.png"
  adaptive_icon_monochrome: "./lib/assets/icons/logo_monochrome.png"

flutter:
  uses-material-design: true

  assets:
    - lib/assets/images/search.png
    - lib/assets/images/broken_heart.png
    - lib/assets/images/check.png
    - lib/assets/images/ghost.png
    - lib/assets/icons/logo_foreground.png
    - lib/assets/icons/logo_monochrome.png

  fonts:
    - family: Poppins
      fonts:
        - asset: lib/assets/fonts/Poppins-Regular.ttf
          style: normal
          weight: 400
        - asset: lib/assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: lib/assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: lib/assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Roboto
      fonts:
        - asset: lib/assets/fonts/Roboto-Regular.ttf
          style: normal
          weight: 400
        - asset: lib/assets/fonts/Roboto-Bold.ttf
          weight: 700
